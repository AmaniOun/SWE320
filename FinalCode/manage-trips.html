<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Manage Trips — SAII Hajj Transport</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="page-wrapper">

<!-- ── SHARED HEADER ── -->
<header class="navbar">
  <div class="navbar-inner">
    <a href="admin-dashboard.html" class="nav-logo">
      <img src="image/saii.png" alt="SAII Logo" class="logo-img"/>
    </a>
    <nav class="nav-links" style="align-items: center; justify-content: center;">
      <a href="admin-dashboard.html"    class="nav-link">Dashboard</a>
      <a href="manage-trips.html" class="nav-link active">Manage Trips</a>
      <a href="add-trip.html"     class="nav-link">Add Trip</a>
      
    </nav>
    <div class="nav-right">
      <span class="role-chip admin">&#9679; Admin</span>
      <span style="color:rgba(255,255,255,.65);font-size:.85rem;">Admin User</span>
      <a href="index.html" class="btn btn-sm btn-outline-dark">Logout</a>
    </div>
    <button class="nav-toggle" onclick="document.getElementById('nm').classList.toggle('open')" aria-label="Menu">&#9776;</button>
  </div>
  <div class="nav-mobile" id="nm">
    <a href="admin-dashboard.html"    class="nav-link">Dashboard</a>
    <a href="manage-trips.html" class="nav-link active">Manage Trips</a>
    <a href="add-trip.html"     class="nav-link">Add Trip</a>
    <div class="nav-mobile-footer"><a href="index.html" class="btn btn-sm btn-outline-dark">Logout</a></div>
  </div>
</header>

<!-- ── CONTENT ── -->
<div class="page-content">
  <div class="page-header">
    <div>
      <h1 class="page-title">All Trips</h1>
      <p class="page-subtitle">Manage all transportation schedules</p>
    </div>
    <a href="add-trip.html" class="btn btn-accent">+ Add New Trip</a>
  </div>

  <div class="search-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search-input" placeholder="Search by Trip ID, bus number or route…" oninput="renderTrips()"/>
  </div>
  <p class="trip-count-label" id="trip-count"></p>
  <div class="trips-list" id="trips-list"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Edit Trip Schedule</h3>
      <button class="btn-modal-close" onclick="closeModal('edit-modal')">&#10005;</button>
    </div>
    <div class="modal-grid">
      <div class="modal-field"><label>From</label><div class="select-wrap"><select class="form-select" id="edit-from"><option>Mina</option><option>Arafat</option><option>Muzdalifah</option><option>Makkah</option><option>Madinah</option></select></div></div>
      <div class="modal-field"><label>To</label><div class="select-wrap"><select class="form-select" id="edit-to"><option>Mina</option><option>Arafat</option><option>Muzdalifah</option><option>Makkah</option><option>Madinah</option></select></div></div>
      <div class="modal-field"><label>Date</label><input class="form-input" type="date" id="edit-date"/></div>
      <div class="modal-field"><label>Departure Time</label><input class="form-input" type="time" id="edit-time"/></div>
      <div class="modal-field"><label>Total Seats</label><input class="form-input" type="number" id="edit-seats" min="1" max="200"/></div>
      <div class="modal-field"><label>Bus Number</label><input class="form-input" type="text" id="edit-bus"/></div>
    </div>
    <button class="btn btn-accent btn-full" style="margin-top:1.1rem;" onclick="saveEdit()">Save Changes</button>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal confirm-modal">
    <div class="confirm-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
      </svg>
    </div>
    <h3>Delete Trip?</h3>
    <p>This action cannot be undone. The trip will be permanently removed.</p>
    <div class="confirm-actions">
      <button class="btn btn-outline btn-full" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-destructive btn-full" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- ── SHARED FOOTER ── -->
<footer class="site-footer">
  <p>© 2026 SAII. All rights reserved.</p>
</footer>

<div class="toast" id="toast"></div>
<script>
  var TRIPS=[
    {id:'TRP-001',busNum:'BUS-12',from:'Mina',to:'Arafat',date:'2026-06-15',time:'08:00',seats:50,booked:35,status:'cancelled'},
    {id:'TRP-002',busNum:'BUS-07',from:'Arafat',to:'Muzdalifah',date:'2026-06-15',time:'14:30',seats:45,booked:10,status:'active'},
    {id:'TRP-003',busNum:'BUS-15',from:'Muzdalifah',to:'Mina',date:'2026-06-16',time:'06:00',seats:50,booked:48,status:'active'},
    {id:'TRP-004',busNum:'BUS-03',from:'Mina',to:'Makkah',date:'2026-06-16',time:'10:00',seats:55,booked:30,status:'active'},
    {id:'TRP-005',busNum:'BUS-22',from:'Makkah',to:'Arafat',date:'2026-06-17',time:'07:30',seats:60,booked:60,status:'active'},
    {id:'TRP-006',busNum:'BUS-09',from:'Arafat',to:'Mina',date:'2026-06-17',time:'16:00',seats:50,booked:20,status:'cancelled'},
    {id:'TRP-007',busNum:'BUS-11',from:'Mina',to:'Muzdalifah',date:'2026-06-18',time:'09:00',seats:45,booked:40,status:'active'},
    {id:'TRP-008',busNum:'BUS-05',from:'Muzdalifah',to:'Arafat',date:'2026-06-18',time:'13:00',seats:55,booked:22,status:'active'}
  ];
  var editingId=null, deletingId=null;

  function fmtDate(d){if(!d)return'';var p=d.split('-'),m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[parseInt(p[1])-1]+' '+parseInt(p[2])+', '+p[0];}
  function fmtTime(t){if(!t)return'';var p=t.split(':'),h=parseInt(p[0]);return(h%12||12)+':'+p[1]+' '+(h>=12?'PM':'AM');}

  function renderTrips(){
    var q=(document.getElementById('search-input').value||'').toLowerCase();
    var f=TRIPS.filter(function(t){return t.id.toLowerCase().indexOf(q)!==-1||t.busNum.toLowerCase().indexOf(q)!==-1||t.from.toLowerCase().indexOf(q)!==-1||t.to.toLowerCase().indexOf(q)!==-1;});
    document.getElementById('trip-count').textContent=q?f.length+' result'+(f.length!==1?'s':'')+' for "'+q+'"':TRIPS.length+' trip'+(TRIPS.length!==1?'s':'')+' total';
    if(!f.length){document.getElementById('trips-list').innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg><p>No trips match your search</p></div>';return;}
    var html='';
    f.forEach(function(t){
      html+='<div class="trip-card"><div class="trip-card-top"><div class="trip-card-title"><div class="bus-icon-wrap"><svg viewBox="0 0 24 24"><path d="M17 5H3C1.89 5 1 5.89 1 7v10c0 1.11.89 2 2 2h1a2 2 0 004 0h6a2 2 0 004 0h1c1.11 0 2-.89 2-2v-5l-3-5zm-1 1.5l2.28 3.5H13V6.5h3zm-11 9a1 1 0 11-2 0 1 1 0 012 0zm9 0a1 1 0 11-2 0 1 1 0 012 0z"/></svg></div><div><span class="trip-bus-name">'+t.busNum+'</span><span class="trip-id-tag"> #'+t.id+'</span></div></div><span class="badge badge-'+t.status+'">'+t.status+'</span></div>'+
      '<div class="trip-route"><span>'+t.from+'</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg><span class="to-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;color:var(--accent)"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>'+t.to+'</span></div>'+
      '<div class="trip-meta"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'+fmtDate(t.date)+'</span><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'+fmtTime(t.time)+'</span><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>'+t.booked+'/'+t.seats+' seats</span></div>'+
      '<div class="trip-actions"><button class="btn btn-sm btn-outline" onclick="openEdit(\''+t.id+'\')">✏ Edit</button>'+(t.status==='active'?'<button class="btn btn-sm btn-ghost" onclick="cancelTrip(\''+t.id+'\')">○ Cancel</button>':'')+
      '<button class="btn btn-sm btn-outline" style="color:var(--destructive);border-color:var(--destructive);" onclick="openDelete(\''+t.id+'\')">🗑 Delete</button></div></div>';
    });
    document.getElementById('trips-list').innerHTML=html;
  }

  function openEdit(id){editingId=id;var t=TRIPS.find(function(x){return x.id===id;});if(!t)return;document.getElementById('edit-from').value=t.from;document.getElementById('edit-to').value=t.to;document.getElementById('edit-date').value=t.date;document.getElementById('edit-time').value=t.time;document.getElementById('edit-seats').value=t.seats;document.getElementById('edit-bus').value=t.busNum;openModal('edit-modal');}
  function saveEdit(){var t=TRIPS.find(function(x){return x.id===editingId;});if(!t)return;var nF=document.getElementById('edit-from').value,nT=document.getElementById('edit-to').value;if(nF===nT){showToast('From and To cannot be the same','error');return;}t.from=nF;t.to=nT;t.date=document.getElementById('edit-date').value;t.time=document.getElementById('edit-time').value;t.seats=parseInt(document.getElementById('edit-seats').value)||t.seats;t.busNum=document.getElementById('edit-bus').value;closeModal('edit-modal');renderTrips();showToast('Trip '+editingId+' updated','success');}
  function cancelTrip(id){var t=TRIPS.find(function(x){return x.id===id;});if(!t)return;t.status='cancelled';renderTrips();showToast('Trip '+id+' cancelled','info');}
  function openDelete(id){deletingId=id;openModal('delete-modal');}
  function confirmDelete(){TRIPS=TRIPS.filter(function(x){return x.id!==deletingId;});closeModal('delete-modal');renderTrips();showToast('Trip '+deletingId+' deleted','error');}

  function openModal(id){document.getElementById(id).classList.add('open');}
  function closeModal(id){document.getElementById(id).classList.remove('open');}
  document.querySelectorAll('.modal-overlay').forEach(function(o){o.addEventListener('click',function(e){if(e.target===o)closeModal(o.id);});});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(function(m){closeModal(m.id);});});

  var _tt;
  function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'info')+' show';clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},3200);}

  renderTrips();
</script>
</body>
</html>
