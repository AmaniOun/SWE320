
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings - SAI System</title>
	<link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root { --primary: #1f3566; --accent: #e2a94b; --success: #2e7d32; --danger: #d92d20; --warning: #f3a000; --bg: #f7f8fc; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #1f2937; line-height: 1.5; }

    .navbar { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; }
    .container { width: 92%; max-width: 1100px; margin: 30px auto; }

    .booking-card { background: #fff; border: 1px solid #eceef3; border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; position: relative; border-left: 6px solid #ccc; transition: 0.2s; }
    .status-badge { font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
    
    .badge-confirmed { background: #e8f5e9; color: var(--success); }
    .badge-cancelled { background: #ffebee; color: var(--danger); }
    .badge-past { background: #fff3e0; color: var(--warning); }
    
    .booking-route { font-size: 17px; font-weight: 700; color: #1f3566; }
    .booking-meta { display: flex; gap: 15px; font-size: 12px; color: #667085; margin-top: 5px; }
    .booking-meta i { color: var(--accent); margin-right: 4px; }

    .booking-actions { display: flex; gap: 10px; }
    .icon-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #e4e7ec; background: #fff; color: #667085; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.3s; }
    
    .btn-qr:hover { border-color: var(--primary); color: var(--primary); background: #f0f4f8; }
    .btn-edit:hover { border-color: var(--accent); color: var(--accent); background: #fff9e6; }
    .btn-cancel:hover { border-color: var(--danger); color: var(--danger); background: #fff5f5; }

    .icon-btn:hover::after { content: attr(data-reason); position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 11px; white-space: nowrap; z-index: 100; }

    /* Modals */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-box { background: #fff; padding: 25px; border-radius: 16px; width: 380px; text-align: center; }
    .btn-primary { background: var(--primary); color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; }
    .btn-ghost { background: #f2f4f7; color: #344054; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }

    input[type="date"], select { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; }
  </style>
</head>

<body class="page-wrapper">
<main class="container">
  <h2>My Bookings</h2>
  <div id="list"></div>
</main>

<div id="qrModal" class="modal">
  <div class="modal-box" style="border-top: 5px solid var(--primary);">
    <h3 id="qrTitle">Boarding Pass</h3>
    <div style="margin: 20px 0; border: 2px dashed #ddd; padding: 20px; display: inline-block; position: relative;">
        <i class="fa-solid fa-qrcode" style="font-size: 100px;"></i>
        <div id="expiredBadge" style="display:none; position: absolute; top: 35%; left: 0; width: 100%; background: rgba(217, 45, 32, 0.9); color: white; padding: 5px; font-weight: 900; transform: rotate(-10deg);">EXPIRED</div></div>
    <p id="qrInfo" style="font-weight: bold; font-size: 14px;"></p>
    <button class="btn-primary" onclick="hideModals()">Close</button>
  </div>
</div>

<div id="editModal" class="modal">
  <div class="modal-box" style="text-align: left; border-top: 5px solid var(--accent);">
    <h3 style="color: var(--primary);">Modify Booking</h3>
    <p style="font-size: 13px; color: #666;">Choose new details for your seat:</p>
    <label style="font-size: 12px; margin-top: 15px; display: block; font-weight: bold;">New Trip Date:</label>
    <input type="date" id="newDateInput" min="2026-03-25">
    <label style="font-size: 12px; margin-top: 10px; display: block; font-weight: bold;">New Route:</label>
    <select id="newRouteInput">
      <option value="Mina → Arafat">Mina → Arafat 08:00</option>
      <option value="Arafat → Muzdalifah">Arafat → Muzdalifah 14:30</option>
      <option value="Muzdalifah → Mina">Muzdalifah → Mina 22:00</option>
    </select>
    <button class="btn-primary" onclick="processEdit()">Update Now</button>
    <button class="btn-ghost" onclick="hideModals()">Cancel</button>
  </div>
</div>

<div id="cancelConfirmModal" class="modal">
  <div class="modal-box" style="border-top: 5px solid var(--danger);">
    <i class="fa-solid fa-triangle-exclamation" style="font-size: 50px; color: var(--danger);"></i>
    <h3 style="margin-top:15px;">Confirm Cancellation</h3>
    <p style="font-size: 14px; color: #666; margin-top: 10px;">This will release your seat. Are you sure?</p>
    <button class="btn-primary" id="executeCancelBtn" style="background: var(--danger);">Yes, Cancel Booking</button>
    <button class="btn-ghost" onclick="hideModals()">No, Keep it</button>
  </div>
</div>

<div id="statusModal" class="modal">
  <div class="modal-box">
    <i id="statusIcon" class="fa-solid" style="font-size: 50px;"></i>
    <h3 id="statusTitle" style="margin-top:15px;"></h3>
    <p id="statusBody" style="font-size: 14px; color: #666; margin-top: 10px;"></p>
    <button class="btn-primary" onclick="hideModals()">Understood</button>
  </div>
</div>

<script>
  let bookings = [
    { id: 101, route: "Arafat → Muzdalifah", date: "2026-08-10", time: "14:30", bus: "Bus-07", tripID: "TRP-42", status: "confirmed" },
    { id: 102, route: "Mina → Arafat", date: "2026-03-20", time: "08:00", bus: "Bus-03", tripID: "TRP-03", status: "confirmed" },
    { id: 103, route: "Arafat → Muzdalifah", date: "2026-04-10", time: "14:30", bus: "Bus-07", tripID: "TRP-42", status: "cancelled" },
    { id: 104, route: "Muzdalifah → Mina", date: "2026-03-24", time: "22:00", bus: "Bus-10", tripID: "TRP-10", status: "confirmed" }
  ];

  let activeId = null;

  function drawList() {
    const listDiv = document.getElementById("list");
    listDiv.innerHTML = "";
    const now = new Date("2026-03-25T00:00:00");

    bookings.forEach(b => {
      const tripTime = new Date(`${b.date}T${b.time}`);
      const hoursDiff = (tripTime - now) / (1000 * 60 * 60);
      
      let color, badge, reason, canDo = false, qrStatus = "valid";

      if (b.status === "cancelled") {
        color = "var(--danger)"; badge = "badge-cancelled"; reason = "Cancelled"; qrStatus = "none";
      } else if (hoursDiff < 0) {
        color = "var(--warning)"; badge = "badge-past"; reason = "Past Trip"; qrStatus = "expired";
      } else if (hoursDiff < 3) {
        color = "var(--warning)"; badge = "badge-confirmed"; reason = "Locked (<3h)";
      } else {
        color = "var(--success)"; badge = "badge-confirmed"; reason = "Modify Trip"; canDo = true;
      }

      listDiv.innerHTML += `
        <div class="booking-card" style="border-left-color: ${color}">
          <div>
            <div class="status-badge ${badge}">${b.status}</div>
            <div class="booking-route">${b.route}</div>
            <div class="booking-meta">
              <span><i class="fa-regular fa-calendar"></i>${b.date}</span>
              <span><i class="fa-regular fa-clock"></i>${b.time}</span>
              <span><i class="fa-solid fa-bus"></i>${b.bus} (ID: ${b.tripID})</span>
            </div></div>
          <div class="booking-actions">
            <button class="icon-btn btn-qr" data-reason="QR Code" onclick="openQR(${b.id}, '${qrStatus}')"><i class="fa-solid fa-qrcode"></i></button>
            <button class="icon-btn btn-edit" data-reason="${reason}" onclick="openEdit(${b.id}, ${canDo}, '${reason}')"><i class="fa-solid fa-pen"></i></button>
            <button class="icon-btn btn-cancel" data-reason="Cancel" onclick="openCancel(${b.id}, ${canDo})"><i class="fa-solid fa-xmark"></i></button>
          </div>
        </div>`;
    });
  }

  function openQR(id, status) {
    if(status === 'none') {
        showStatus("Action Denied", "QR is not available for cancelled trips.", "var(--danger)", "fa-circle-xmark");
        return;
    }
    const b = bookings.find(x => x.id === id);
    document.getElementById("qrInfo").innerText = b.route + " | " + b.bus;
    document.getElementById("expiredBadge").style.display = (status === 'expired') ? 'block' : 'none';
    document.getElementById("qrModal").classList.add("active");
  }

  function openEdit(id, allowed, msg) {
    if(!allowed) {
      showStatus("Modification Locked", "You cannot modify this trip because it is " + msg, "var(--warning)", "fa-lock");
    } else {
      activeId = id;
      const b = bookings.find(x => x.id === id);
      document.getElementById("newDateInput").value = b.date;
      document.getElementById("newRouteInput").value = b.route;
      document.getElementById("editModal").classList.add("active");
    }
  }

  function processEdit() {
   /* const b = bookings.find(x => x.id === activeId);
    b.date = document.getElementById("newDateInput").value;
    b.route = document.getElementById("newRouteInput").value;
    hideModals();
    drawList();
    showStatus("Success", "Your seat details have been updated successfully!", "var(--success)", "fa-circle-check");
	*/
	


    // 1. البحث عن الحجز المطلوب
    const b = bookings.find(x => x.id === activeId);
    
    // التأكد أن الحجز موجود قبل التعديل
    if (b) {
        // 2. سحب القيم الجديدة من الحقول
        const newDate = document.getElementById("newDateInput").value;
        const newRoute = document.getElementById("newRouteInput").value;
        
        // 3. تحديث البيانات في المصفوفة
        b.date = newDate;
        b.route = newRoute;

        // 4. تحديث الوقت تلقائياً بناءً على الروت المختار (عشان الحسبة تظل صحيحة)
        if (newRoute.includes("Mina → Arafat")) {
            b.time = "08:00";
        } else if (newRoute.includes("Arafat → Muzdalifah")) {
            b.time = "14:30";
        } else if (newRoute.includes("Muzdalifah → Mina")) {
            b.time = "22:00";
        }

        // 5. إغلاق النوافذ وتحديث القائمة فوراً
        hideModals();
        drawList();

        // 6. إظهار رسالة النجاح مع تفاصيل الروت والوقت الجديد
        const successMsg = "Trip updated to: " + b.route + " at " + b.time;
        showStatus("Success", successMsg, "var(--success)", "fa-circle-check");
    }





  }

  function openCancel(id, allowed) {
    if(!allowed) {
      showStatus("Action Locked", "Past or cancelled trips cannot be modified.", "var(--warning)", "fa-lock");
    } else {
      activeId = id;
      document.getElementById("cancelConfirmModal").classList.add("active");
    }
  }

  document.getElementById("executeCancelBtn").onclick = function() {
    bookings.find(x => x.id === activeId).status = "cancelled";
    hideModals();
    drawList();
    showStatus("Cancelled", "The reservation has been cancelled successfully.", "var(--danger)", "fa-trash-can");
  }

  function showStatus(title, body, color, icon) {
    document.getElementById("statusTitle").innerText = title;
    document.getElementById("statusBody").innerText = body;
    document.getElementById("statusIcon").className = "fa-solid " + icon;
    document.getElementById("statusIcon").style.color = color;
    document.getElementById("statusModal").classList.add("active");
  }

  function hideModals() {
    document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
  }

  drawList();
</script>
</body>
</html>
