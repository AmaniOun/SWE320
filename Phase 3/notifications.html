    <h2>Trip Notifications</h2>
    <p>Please check your trips and review any potential delays.</p>

  <div class="trips-grid" id="notification-grid">

  </div>

<div class="toast" id="toast"></div>

<script>
var DELAYS = [
  { id: 'TRP-002', route: 'Arafat → Muzdalifah', originalTime: '14:30', newTime: '15:15', bus: 'BUS-07', reason: 'Traffic congestion' },
  { id: 'TRP-004', route: 'Mina → Makkah', originalTime: '10:00', newTime: '10:45', bus: 'BUS-03', reason: 'Road maintenance' }
];

function renderNotifications() {
  var html = '';
  DELAYS.forEach(function(d){
    html +=
      '<div class="trip-photo-card">' +
        '<div class="trip-photo-body">' +
          '<div class="trip-photo-route">'+d.route+'</div>' +
          '<div class="trip-photo-meta">' +
            '<span>🚌 '+d.bus+'</span>' +
            '<span>⏰ Original: '+d.originalTime+'</span>' +
            '<span>⏰ New: '+d.newTime+'</span>' +
          '</div>' +
          '<div class="trip-photo-footer">' +
            '<span style="color:#d9534f;">⚠ '+d.reason+'</span>' +
            '<button class="btn btn-sm btn-accent" onclick="acknowledge(\''+d.id+'\')">Acknowledge</button>' +
          '</div>' +
        '</div>' +
      '</div>';
  });
  document.getElementById('notification-grid').innerHTML = html;
}

function acknowledge(id){
  showToast('You acknowledged delay for '+id,'info');
}

var _tt;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type||'info') + ' show';
  clearTimeout(_tt);
  _tt = setTimeout(function(){ t.classList.remove('show'); }, 3200);
}

renderNotifications();
</script>
